name: rustix-auto-alive

on:
  # 定时触发：默认每 6 小时运行一次（可按需调整 cron 表达式）
  schedule:
    - cron: '0 */6 * * *'
  # 支持手动触发
  workflow_dispatch:

# 同一时间只允许一个实例运行
concurrency:
  group: rustix-auto
  cancel-in-progress: false

jobs:
  rustix-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: rustix-auto/requirements.txt

      - name: 安装依赖
        working-directory: rustix-auto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: python -m playwright install --with-deps chromium

      - name: 运行自动启动脚本
        working-directory: rustix-auto
        env:
          # 从 GitHub Secrets 读取账号，格式：邮箱:密码,邮箱:密码
          # 例：a@example.com:pwd1,b@example.com:pwd2
          ACCOUNTS: ${{ secrets.RUSTIX_ACCOUNTS }}
          # Telegram 通知（可选，未配置 Secret 则不推送）
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log
          path: |
            rustix-auto/run.log
            rustix-auto/debug_*.png
          if-no-files-found: ignore
          retention-days: 7
